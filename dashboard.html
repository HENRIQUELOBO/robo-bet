<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel de Histórico - LOBO</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;background:#0b1220;color:#e6eef8;padding:20px}
    .totais{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .card{background:#071122;padding:12px;border-radius:10px;border:1px solid #123;min-width:160px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:6px 8px;border-bottom:1px solid #152433}
    .btn{padding:6px 10px;border-radius:6px;border:0;cursor:pointer}
    .green{background:#1f7a1f;color:#fff}
    .red{background:#8b1f1f;color:#fff}
    .muted{color:#99a7bf}
    .lista{max-height:60vh;overflow:auto;margin-top:12px}
    /* Resultado styled like a button for emphasis */
    td.res { white-space:nowrap }
    .res-span { display:inline-block; padding:6px 10px; border-radius:8px; font-weight:700; min-width:48px; text-align:center }
    .res-span.green { background:#1f7a1f; color:#fff }
    .res-span.red { background:#8b1f1f; color:#fff }
    .res-span.muted { background:transparent; color:#99a7bf; font-weight:600 }
    /* small edit icon for action when result exists */
    .action-icon{padding:6px 8px;border-radius:6px;border:0;background:#06202a;color:#9fd0ff;cursor:pointer}
  </style>
</head>
<body>
  <h1>Painel de Histórico de Gatilhos</h1>
  <p class="muted">Totalizadores por tipo de sinal. Clique em cada linha para marcar GREEN/RED e confirme.</p>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <div id="totais" class="totais"></div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <input id="filtro" placeholder="filtro por partida/tipo" style="padding:6px;border-radius:6px;border:1px solid #123;background:#04101a;color:#e6eef8" />
      <button id="btn-order" class="btn" title="Ordenar por acerto">Acerto ↑</button>
      <button id="btn-apply" class="btn" style="background:#0b3b5a;color:#fff">Aplicar confirmações</button>
    </div>
  </div>

  <div class="card">
    <strong>Jogos (confirmações)</strong>
    <div class="lista"><table id="tbl"><thead><tr><th>ID</th><th>Data</th><th>Partida</th><th>Tipo</th><th>Tempo</th><th>Placar</th><th>Resultado</th><th>Ação</th></tr></thead><tbody></tbody></table></div>
  </div>

<script>
let totalsOrderAsc = true; // true => ascending by pct
async function carregar(){
  const r = await fetch('/api/historico');
  const j = await r.json();
  if(!j.ok){ alert('Erro: '+(j.erro||'')) ; return; }
  const totals = j.totals || {};
  const totEl = document.getElementById('totais'); totEl.innerHTML='';
  // build array with pct and sort by pct ascending
  const tipos = Object.keys(totals).map(tipo => {
    const t = totals[tipo] || { total:0, GREEN:0, RED:0 };
    const pct = t.total > 0 ? Math.round((t.GREEN / t.total) * 1000) / 10 : 0;
    return { tipo, t, pct };
  }).sort((a,b) => (totalsOrderAsc ? (a.pct - b.pct) : (b.pct - a.pct)));
  for (const entry of tipos) {
    const tipo = entry.tipo;
    const t = entry.t;
    const pct = entry.pct;
    const div = document.createElement('div'); div.className='card';
    div.innerHTML = `
      <div style="font-size:12px;opacity:.9">${tipo||'(unknown)'}</div>
      <div style="font-weight:800;font-size:18px">${t.total}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <div style="font-size:12px;color:#7bd07b">G: ${t.GREEN}</div>
        <div style="font-size:12px;color:#f28b8b">R: ${t.RED}</div>
        <div style="margin-left:auto;font-size:12px;color:#9fd0ff;font-weight:700">Acerto: ${pct}%</div>
      </div>`;
    totEl.appendChild(div);
  }
  const tbody = document.querySelector('#tbl tbody'); tbody.innerHTML='';
  // apply optional filter
  const filtro = (document.getElementById('filtro').value||'').toLowerCase().trim();
  const rows = j.rows.filter(row=>{
    if(!filtro) return true;
    return (row.partida||'').toLowerCase().includes(filtro) || (row.tipo||'').toLowerCase().includes(filtro);
  });
  // order rows descending (newest / highest id first)
  rows.sort((a,b)=> (b.id||0) - (a.id||0));
  // load pending confirmations
  let confirmacoes = {};
  try { const rc = await fetch('/api/confirmacoes'); const jc = await rc.json(); if (jc.ok) confirmacoes = jc.confirmacoes || {}; } catch(e) { confirmacoes = {}; }
  // simple pagination: show first 200
  const PAGE = 200;
  rows.slice(0, PAGE).forEach(row=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.id}</td><td>${row.dateTime}</td><td title="${row.raw}">${row.partida}</td><td>${row.tipo}</td><td>${row.tempo}</td><td>${row.placar}</td><td class="res"><span class="res-span">${row.resultado||'?'}</span></td><td></td>`;
    // render result with button-like highlight
    const resSpan = tr.querySelector('.res-span');
    const pending = confirmacoes[String(row.id)];
    if (pending) {
      const c = pending;
      tr.style.background = c.resultado === 'GREEN' ? 'rgba(34,139,34,0.06)' : 'rgba(178,34,34,0.04)';
      resSpan.textContent = c.resultado;
      resSpan.className = 'res-span ' + (c.resultado === 'GREEN' ? 'green' : 'red');
    } else if (!row.resultado) {
      resSpan.textContent = '?';
      resSpan.className = 'res-span muted';
    } else {
      resSpan.textContent = row.resultado;
      resSpan.className = 'res-span ' + (row.resultado === 'GREEN' ? 'green' : 'red');
    }

    const cell = tr.querySelector('td:last-child');
    const btnG = document.createElement('button'); btnG.className='btn green'; btnG.textContent='GREEN';
    const btnR = document.createElement('button'); btnR.className='btn red'; btnR.textContent='RED';
    btnG.onclick = ()=>confirmar(row.id,'GREEN',tr);
    btnR.onclick = ()=>confirmar(row.id,'RED',tr);

    // show buttons only if there is no result; otherwise show an edit icon that reveals the buttons when clicked
    if ((pending && pending.resultado) || row.resultado) {
      const edit = document.createElement('button'); edit.className='action-icon'; edit.textContent = '✎'; edit.title = 'Editar resultado';
      edit.onclick = ()=>{
        edit.style.display = 'none';
        cell.appendChild(btnG); cell.appendChild(document.createTextNode(' ')); cell.appendChild(btnR);
        const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = '×'; cancel.style.marginLeft = '6px';
        cancel.onclick = ()=>{ try{ btnG.remove(); btnR.remove(); }catch(e){} cancel.remove(); edit.style.display = 'inline-block'; };
        cell.appendChild(cancel);
      };
      cell.appendChild(edit);
      // if there's a pending confirmation for this row, show a small per-row "Confirme" button to apply it immediately
      if (pending) {
        const btnC = document.createElement('button'); btnC.className = 'btn'; btnC.textContent = 'Confirme'; btnC.style.marginLeft = '8px';
        btnC.onclick = async ()=>{
          if (!confirm(`Aplicar confirmação da linha ${row.id} ao CSV?`)) return;
          try {
            btnC.disabled = true;
            const r2 = await fetch('/api/historico/apply', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ids: [row.id] }) });
            const j2 = await r2.json();
            if (!j2.ok) { alert('Erro: '+(j2.erro||'')); btnC.disabled = false; return; }
            alert('Aplicadas: '+j2.applied+' linhas. Backup criado.');
            carregar();
          } catch(e) { alert('Falha: '+e.message); btnC.disabled = false; }
        };
        cell.appendChild(btnC);
      }
    } else {
      cell.appendChild(btnG); cell.appendChild(document.createTextNode(' ')); cell.appendChild(btnR);
    }
    tbody.appendChild(tr);
  });
  // enable/disable apply button depending on pending confirmations
  const btnApply = document.getElementById('btn-apply');
  btnApply.disabled = Object.keys(confirmacoes||{}).length === 0;
}

async function confirmar(id, resultado, tr){
  if(!confirm(`Marcar linha ${id} como ${resultado}?`)) return;
  try{
    const r = await fetch(`/api/historico/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resultado})});
    const j = await r.json();
    if(!j.ok) { alert('Erro: '+(j.erro||'')); return; }
    // visually mark as pending confirmation
    tr.style.background = resultado === 'GREEN' ? 'rgba(34,139,34,0.08)' : 'rgba(178,34,34,0.06)';
    const resSpan = tr.querySelector('.res-span');
    if (resSpan) {
      resSpan.textContent = j.resultado;
      resSpan.className = 'res-span ' + (j.resultado === 'GREEN' ? 'green' : 'red');
    }
    // reload totals/confirmations in background
    carregar();
  }catch(e){ alert('Falha: '+e.message); }
}

document.getElementById('btn-apply').addEventListener('click', async ()=>{
  if(!confirm('Aplicar todas as confirmações pendentes ao CSV? Será criado um backup.')) return;
  try{
    const r = await fetch('/api/historico/apply',{method:'POST'});
    const j = await r.json();
    if(!j.ok) return alert('Erro: '+(j.erro||''));
    alert('Aplicadas: '+j.applied+' linhas. Backup criado.');
    carregar();
  }catch(e){ alert('Falha: '+e.message); }
});

document.getElementById('filtro').addEventListener('input', ()=>{ scheduleCarregar(); });
let _carregarTimer = null; function scheduleCarregar(){ if(_carregarTimer) clearTimeout(_carregarTimer); _carregarTimer = setTimeout(()=>{ carregar(); }, 250); }

// toggle ordering button
document.getElementById('btn-order').addEventListener('click', ()=>{
  totalsOrderAsc = !totalsOrderAsc;
  const b = document.getElementById('btn-order');
  b.textContent = totalsOrderAsc ? 'Acerto ↑' : 'Acerto ↓';
  carregar();
});

carregar();
</script>
</body>
</html>
