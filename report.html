<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relatório de Telemetria — Wolf Quant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">
  <header class="bg-gray-900 border-b border-gray-800 p-4 flex items-center gap-4">
    <a href="/" class="text-amber-400 font-bold">← Voltar</a>
    <h1 class="text-lg font-bold">Relatório de Telemetria</h1>
    <div class="ml-auto text-sm text-gray-400">Gerado: <span id="gen-time">—</span></div>
  </header>
  <main class="p-6">
    <section class="mb-6">
      <div class="flex items-center gap-3">
        <button id="btn-load" class="px-4 py-2 bg-amber-500 text-black rounded font-bold">Carregar relatório</button>
        <button id="btn-refresh" class="px-3 py-2 bg-gray-800 text-gray-200 rounded">Recarregar arquivos</button>
        <input id="filter-method" placeholder="Filtrar por método (ex: GATILHO_2T)" class="ml-auto bg-gray-900 border border-gray-800 rounded px-3 py-2 text-sm" />
      </div>
    </section>

    <section>
      <div id="summary" class="mb-4"></div>
      <div id="report-source-note" class="text-xs text-gray-500 mb-2"></div>
      <div id="report-list" class="space-y-4"></div>
    </section>
  </main>

  <script>
    async function loadReport() {
      // Prefer compact report if available to avoid loading huge telemetry JSON
      // Use the explicit API endpoints added to `httpServer.js` so the client requests
      // the deterministic JSON-serving routes even if another process answers :3000
      // Use same-origin API endpoints; fallback to helper server on 3001 if needed
      const paths = ['/api/reports/telemetry_report_compact.json', '/api/reports/telemetry_report.json'];
      const fallbackHost = 'http://localhost:3000';
      let data = null;
      let lastErr = null;
      const cacheBust = '?_=' + Date.now();
      for (const p of paths) {
        try {
          // do not append cacheBust to same-origin API paths (some handlers reject query params)
          let url = p;
					console.log(url, 'urlurlurl')
          let res = await fetch(url, { cache: 'no-store' });
					console.log(res, 'res')
          if (!res.ok) {
            try {
              const fallbackUrl = fallbackHost + p + cacheBust;
              res = await fetch(fallbackUrl, { cache: 'no-store' });
              if (res.ok) url = fallbackUrl;
            } catch (e) {
              // ignore fallback error
            }
          }
          if (!res.ok) throw new Error('HTTP ' + res.status + ' for ' + p);
          data = await res.json();
          data.__loadedFrom = url;
          break;
        } catch (e) {
          lastErr = e;
          data = null;
        }
      }
      if (!data) {
        document.getElementById('report-list').innerHTML = `<div class="p-4 bg-red-900 rounded">Erro ao carregar relatório: ${lastErr && lastErr.message}</div>`;
        return;
      }
      // Normalize data: if we accidentally loaded the full telemetry JSON, convert to compact shape
      const normalize = (raw) => {
        if (!raw || !Array.isArray(raw.files)) return raw;
        // detect compact shape by checking first snapshot fields
        const firstFile = raw.files[0];
        const firstSnap = firstFile && firstFile.snapshots && firstFile.snapshots[0];
        const isCompact = firstSnap && (firstSnap.snapshot && (firstSnap.snapshot.tempo !== undefined) && (firstSnap.fired !== undefined));
        if (isCompact) return raw;
        // convert full telemetry_report.json -> compact
        const compact = { generatedAt: raw.generatedAt || raw.generatedAt, files: [] };
        for (const f of raw.files || []) {
          const fr = { file: f.file, snapshots: [] };
          for (const s of f.snapshots || []) {
            const snap = s.snapshot || s || {};
            const fired = s.fired || s.alertas || [];
            // attempt to extract per-method small analysis
            const methods = {};
            const analysis = s.explanation || s.analysis || s._engineAnalysis || s.engineAnalysis || {};
            if (analysis && typeof analysis === 'object') {
              for (const k of Object.keys(analysis)) {
                const v = analysis[k];
                if (v && typeof v === 'object') {
                  methods[k] = { confidence: v.confidence || v.conf || null, criteria: Array.isArray(v.criteria)? v.criteria : [], satisfied: Array.isArray(v.satisfied)? v.satisfied:[], missing: Array.isArray(v.missing)? v.missing:[] };
                }
              }
            }
            fr.snapshots.push({ snapshot: { tempo: snap.tempo, placar: snap.placar, partida: snap.partida || snap.nomePartida || null }, fired, methods });
          }
          compact.files.push(fr);
        }
        return compact;
      };

      const normalized = normalize(data);
      document.getElementById('gen-time').textContent = normalized.generatedAt || '—';
      const noteEl = document.getElementById('report-source-note');
      if (noteEl) noteEl.textContent = data && data.__loadedFrom ? `Fonte: ${data.__loadedFrom}` : 'Fonte: compacto';
      renderReportByMatch(normalized);
    }

    // Render a compact report grouped by partida (one card per match)
    function renderReportByMatch(data) {
      const reportList = document.getElementById('report-list');
      reportList.innerHTML = '';
      const filter = (document.getElementById('filter-method').value || '').toUpperCase();

      // Build global summary for top section
      const globalSummary = {};
      for (const f of data.files) {
        for (const s of f.snapshots) {
          const fired = (s.fired||[]).map(x=>String(x).toUpperCase());
          for (const m of fired) {
            globalSummary[m] = globalSummary[m] || { fired:0, sumConf:0, withConf:0 };
            globalSummary[m].fired++;
            const conf = (s.methods && s.methods[m] && s.methods[m].confidence) || (s.analysis && s.analysis[m] && s.analysis[m].confidence) || null;
            if (conf !== null && conf !== undefined) { globalSummary[m].withConf++; globalSummary[m].sumConf += Number(conf) || 0; }
          }
        }
      }
      const summaryEl = document.getElementById('summary');
      const rows = Object.keys(globalSummary).sort((a,b)=>globalSummary[b].fired-globalSummary[a].fired).map(k=>{
        const it = globalSummary[k];
        const avg = it.withConf? (it.sumConf/it.withConf).toFixed(2) : '—';
        return `<div class="px-3 py-1 bg-gray-900 rounded flex justify-between items-center"><div class="font-mono text-sm">${k}</div><div class="text-right"><div class="font-bold text-amber-400">${it.fired}</div><div class="text-xs text-gray-400">avg conf: ${avg}</div></div></div>`;
      }).join('');
      summaryEl.innerHTML = `<h2 class="text-md font-bold mb-2">Resumo por método</h2><div class="grid grid-cols-2 gap-2">${rows||'<div class="text-gray-500">Nenhum método disparado nos arquivos.</div>'}</div>`;

      // Group snapshots by partida across all files
      const partidas = new Map(); // partida -> { snapshots: [], fileNames: Set }
      for (const f of data.files) {
        for (const s of f.snapshots) {
          const partida = (s.snapshot && (s.snapshot.partida || s.snapshot.nomePartida || s.snapshot.match || s.snapshot.name)) || f.file || '—';
          if (!partidas.has(partida)) partidas.set(partida, { snapshots: [], files: new Set() });
          partidas.get(partida).snapshots.push(s);
          partidas.get(partida).files.add(f.file);
        }
      }

      // For each partida create a single card listing all methods seen for that match
      for (const [partida, info] of partidas.entries()) {
        // collect methods across snapshots
        const methods = {};
        for (const s of info.snapshots) {
          const fired = (s.fired||[]).map(x=>String(x).toUpperCase());
          for (const m of fired) {
            if (filter && !String(m).includes(filter)) continue;
            methods[m] = methods[m] || { count:0, sumConf:0, withConf:0, examples: [] };
            methods[m].count++;
            const conf = (s.methods && s.methods[m] && s.methods[m].confidence) || (s.analysis && s.analysis[m] && s.analysis[m].confidence) || null;
            if (conf !== null && conf !== undefined) { methods[m].withConf++; methods[m].sumConf += Number(conf) || 0; }
            methods[m].examples.push(s);
          }
        }

        const container = document.createElement('div');
        container.className = 'bg-gray-900 border border-gray-800 rounded p-4';
        const header = document.createElement('div'); header.className = 'flex items-center justify-between mb-3';
        header.innerHTML = `<div class="font-bold text-lg">${partida}</div><div class="text-sm text-gray-400">Arquivos: ${Array.from(info.files).join(', ')}</div>`;
        container.appendChild(header);

        const grid = document.createElement('div'); grid.className = 'grid grid-cols-2 gap-2';
        const methodKeys = Object.keys(methods).sort((a,b)=>methods[b].count-methods[a].count);
        if (methodKeys.length===0) {
          const p = document.createElement('div'); p.className = 'p-3 bg-gray-800 rounded'; p.textContent = 'Nenhum método detectado para esta partida.'; grid.appendChild(p);
        } else {
          for (const mk of methodKeys) {
            const m = methods[mk];
            const avg = m.withConf? (m.sumConf/m.withConf).toFixed(2) : '—';
            const card = document.createElement('div'); card.className = 'p-3 bg-gray-950 rounded';
            card.innerHTML = `<div class="font-mono font-bold">${mk}</div><div class="text-xs text-gray-400">Ocorrências: ${m.count} — avg conf: ${avg}</div>`;
            // small details toggle
            const btn = document.createElement('button'); btn.className = 'mt-2 px-2 py-1 text-xs bg-gray-800 rounded text-gray-200'; btn.textContent = 'Ver exemplos';
            const details = document.createElement('div'); details.className = 'mt-2 space-y-1 hidden';
            for (const ex of m.examples.slice(0,5)) {
              const tempo = ex.snapshot && (ex.snapshot.tempo || 'N/D');
              const placar = ex.snapshot && (ex.snapshot.placar || 'N/D');
              const firedTag = (ex.fired||[]).map(x=>String(x).toUpperCase()).join(', ');
              const conf = (ex.methods && ex.methods[mk] && ex.methods[mk].confidence) || (ex.analysis && ex.analysis[mk] && ex.analysis[mk].confidence) || '';
              const d = document.createElement('div'); d.className = 'p-2 bg-gray-900 rounded text-sm'; d.innerHTML = `<div><strong>Min:</strong> ${tempo}' — <strong>Placar:</strong> ${placar}</div><div class="text-xs text-gray-400">Fired: ${firedTag} ${conf? '— conf: '+Number(conf).toFixed(2):''}</div>`;
              details.appendChild(d);
            }
            btn.addEventListener('click', ()=> { details.classList.toggle('hidden'); });
            card.appendChild(btn); card.appendChild(details);
            grid.appendChild(card);
          }
        }
        container.appendChild(grid);
        reportList.appendChild(container);
      }
    }

    function showDetails(file, s) {
      // Render a compact, readable detail view instead of dumping full telemetry JSON
      const w = window.open('', '_blank', 'width=1000,height=800');
      const analysis = s.analysis || s._engineAnalysis || s.engineAnalysis || {};
      const fired = (s.fired||[]).map(x=>String(x).toUpperCase());
      const snapshot = s.snapshot || {};
      const parts = [];
      parts.push(`<h2 class="font-bold mb-2">${file} — Min ${snapshot.tempo || 'N/D'}'</h2>`);
      parts.push(`<div class="mb-2"><strong>Placar:</strong> ${snapshot.placar || 'N/D'} — <strong>Nome:</strong> ${snapshot.partida || snapshot.nomePartida || snapshot.name || 'N/D'}</div>`);
      // Methods
      parts.push('<h3 class="font-semibold">Métodos (detalhe)</h3>');
      if (fired.length===0 && Object.keys(analysis).length===0) {
        parts.push('<div class="p-2 bg-gray-800 rounded">Nenhuma análise disponível para este snapshot.</div>');
      } else {
        const methodsToShow = fired.length? fired : Object.keys(analysis || {});
        for (const m of methodsToShow) {
          const mm = String(m).toUpperCase();
          const ma = analysis[mm] || analysis[m] || {};
          parts.push(`<div class="mt-2 p-2 bg-gray-800 rounded"><div class="flex justify-between"><div class="font-mono">${mm}</div><div class="text-sm text-amber-400">${(s.fired||[]).includes(m)?'Fired':'—'}</div></div>`);
          if (ma.confidence) parts.push(`<div class="text-xs text-gray-400">Confiança: ${Number(ma.confidence).toFixed(2)}</div>`);
          const criteria = Array.isArray(ma.criteria) && ma.criteria.length? ma.criteria : (ma.satisfied || ma.met || []);
          parts.push('<div class="mt-2">');
          // If explicit criteria present, render them; otherwise show satisfied/missing lists
          if (Array.isArray(criteria) && criteria.length) {
            for (const c of criteria) {
              const ok = (ma.satisfied && ma.satisfied.includes(c)) || false;
              parts.push(`<div class="flex justify-between px-2 py-1 rounded ${ok? 'bg-green-900':'bg-red-900'}"><div>${c}</div><div class="text-xs">${ok? 'OK':'NÃO'}</div></div>`);
            }
          } else {
            const sat = Array.isArray(ma.satisfied)? ma.satisfied : [];
            const miss = Array.isArray(ma.missing)? ma.missing : [];
            if (sat.length) parts.push(`<div class="text-sm text-green-300">Atendidos: ${sat.join(', ')}</div>`);
            if (miss.length) parts.push(`<div class="text-sm text-red-300">Faltaram: ${miss.join(', ')}</div>`);
            if (!sat.length && !miss.length) parts.push('<div class="text-sm text-gray-400">Sem critérios detalhados</div>');
          }
          parts.push('</div></div>');
        }
      }
      // Compact snapshot summary (hide large arrays)
      parts.push('<h3 class="mt-4 font-semibold">Snapshot (resumo)</h3>');
      const keys = Object.keys(snapshot).filter(k=>!(Array.isArray(snapshot[k]) || typeof snapshot[k] === 'object'));
      parts.push('<div class="grid grid-cols-2 gap-2">');
      for (const k of keys) parts.push(`<div class="p-2 bg-gray-800 rounded"><div class="text-xs text-gray-400">${k}</div><div class="font-mono">${String(snapshot[k])}</div></div>`);
      parts.push('</div>');
      // Raw JSON download link
      parts.push('<div class="mt-4"><a id="rawlink" href="#" class="text-amber-400 underline">Baixar JSON</a></div>');
      const html = `<!doctype html><html><head><meta charset="utf-8"><title>Detalhe snapshot</title><link href="https://cdn.tailwindcss.com" rel="stylesheet"></head><body class="bg-gray-900 text-white p-6 font-sans">${parts.join('')}</body></html>`;
      w.document.write(html);
      // attach raw JSON download
      try {
        const blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = w.document.getElementById('rawlink');
        if (a) { a.href = url; a.download = `${file.replace(/\s+/g,'_')}_min${snapshot.tempo||'ND'}.json`; }
      } catch (e) {}
      w.document.close();
    }

    document.getElementById('btn-load').addEventListener('click', ()=>loadReport());
    document.getElementById('btn-refresh').addEventListener('click', ()=>{ loadReport(); });
    document.getElementById('filter-method').addEventListener('input', ()=>loadReport());

    // auto-load on open
    loadReport();
  </script>
</body>
</html>
