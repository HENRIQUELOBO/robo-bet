<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Wolf Quant - Live Pro</title>
	<script src="./asset/tailwindcss.js"></script>
	<link rel="icon" type="image/x-icon" href="asset/icon.png">
	<style>
		@keyframes pulse-red { 0%, 100% { background-color: rgba(220, 38, 38, 1); border-color: rgba(239, 68, 68, 1); } 50% { background-color: rgba(153, 27, 27, 1); border-color: rgba(220, 38, 38, 1); } }
		.alerta-ativo { animation: pulse-red 2s infinite; }
		.text-3xs { font-size: 0.65rem; } .text-2xs { font-size: 0.75rem; }
		#modal-momentum { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
		#modal-momentum.open { display:flex; }
		#modal-analysis { display:none; position:fixed; inset:0; z-index:10000; align-items:center; justify-content:center; }
		#modal-analysis.open { display:flex; }
		#modal-momentum img { max-width:92vw; max-height:88vh; border-radius:12px; border:1px solid #374151; box-shadow:0 0 60px rgba(0,0,0,0.8); }
		.momentum-thumb { cursor:zoom-in; transition:opacity .2s; }
		.momentum-thumb:hover { opacity:.85; }
		.engine-badge { transition: transform .12s ease; }
		.engine-badge:hover { transform: translateY(-2px); }
	</style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">
<header class="border-b border-gray-800 bg-gray-900 px-6 py-4 shadow-lg">
	<div class="flex justify-between items-center mb-4">
		<div class="flex items-center space-x-3"><span class="text-2xl">🐺</span><h1 class="text-xl font-bold tracking-wider text-amber-500">LOBO QUANT PLATFORM</h1></div>
		<div class="flex items-center space-x-2 text-sm bg-gray-950 px-3 py-1.5 rounded-md border border-gray-800"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span><span class="text-gray-400 font-mono">VPS STREAM: ATIVO</span></div>
	</div>

	<nav class="flex items-center gap-3 mt-2">
		<a href="/" class="text-sm font-medium px-3 py-1 rounded hover:bg-gray-800/60 text-amber-400">Home</a>
		<a href="dashboard" class="text-sm font-medium px-3 py-1 rounded hover:bg-gray-800/60 text-gray-300">Dashboard</a>
		<a href="report.html" class="text-sm font-medium px-3 py-1 rounded hover:bg-gray-800/60 text-gray-300">Relatório de bot</a>
		<a href="#" onclick="window.location.reload();return false;" class="ml-auto text-sm px-3 py-1 rounded bg-gray-800/50 hover:bg-gray-800 text-gray-300">⟳ Atualizar</a>
		<button id="btn-order-time" onclick="toggleOrderTime();" class="text-sm px-3 py-1 rounded bg-gray-800/50 hover:bg-gray-800 text-gray-300">Tempo ↓</button>
	</nav>
	<div class="flex items-center gap-3">
		<input
			id="input-url"
			type="url"
			placeholder="🔗 Cole a URL do RadarFutebol aqui..."
			class="flex-1 bg-gray-950 border border-gray-700 text-gray-100 text-sm font-mono rounded-lg px-4 py-2.5 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 placeholder-gray-600 transition"
		/>
		<button
			id="btn-iniciar"
			onclick="adicionarJogo()"
			class="bg-amber-500 hover:bg-amber-400 active:bg-amber-600 text-gray-950 font-black text-sm tracking-wider px-5 py-2.5 rounded-lg transition flex items-center gap-2 whitespace-nowrap"
		>
			▶ INICIAR
		</button>
	</div>
	<p id="msg-status" class="text-xs font-mono mt-2 h-4 text-gray-500"></p>
</header>

<main class="p-6">

	<div id="modal-momentum" onclick="fecharModal()">
		<div style="position:relative;" onclick="event.stopPropagation()">
			<img id="modal-momentum-img" src="" alt="Momentum Chart" />
			<button onclick="fecharModal()" style="position:absolute;top:-14px;right:-14px;background:#1f2937;border:1px solid #374151;color:#9ca3af;border-radius:50%;width:30px;height:30px;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;">×</button>
		</div>
	</div>

	<div id="modal-analysis" onclick="closeAnalysis()" style="position:fixed; inset:0; z-index:10000; align-items:center; justify-content:center;">
		<div id="modal-analysis-box" onclick="event.stopPropagation()" style="max-width:760px; width:92%; background:#0b1220; border:1px solid #21262b; padding:16px; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.7); position:relative;">
			<div class="flex justify-between items-center mb-3">
				<div id="modal-analysis-title" class="text-2xs font-bold text-gray-200">🔬 Análise do Motor — Métodos</div>
				<div><button onclick="closeAnalysis()" class="text-2xs px-2 py-1 rounded bg-gray-800 border border-gray-700">Fechar</button></div>
			</div>
			<div id="modal-analysis-content" style="max-height:60vh; overflow:auto;"></div>
		</div>
	</div>

	<div id="modal-embed" style="display:none;position:fixed;inset:0;z-index:11000;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);">
		<div style="width:95%;max-width:1100px;height:88vh;background:#07121a;border-radius:10px;overflow:hidden;position:relative;border:1px solid #21303a;">
			<button onclick="closeEmbedModal()" style="position:absolute;right:10px;top:8px;z-index:12;background:#0b1220;border:1px solid #374151;color:#9ca3af;border-radius:6px;padding:6px 8px;">× Fechar</button>
			<iframe id="embed-iframe" src="" frameborder="0" style="width:100%;height:100%;background:white;" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
		</div>
	</div>

	<div id="grid-jogos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
		<div class="col-span-full text-center py-20 text-gray-500 font-mono border border-dashed border-gray-800 rounded-xl bg-gray-900/10">🔍 Conectando à esteira de dados assíncronos da VPS...</div>
	</div>
</main>

<script>
	// In production we prefer to derive the API base from an injected config or the current origin.
	// window.__CONFIG__ can be injected by the server (if desired) to override values.
	const API_BASE = (window.__CONFIG__ && window.__CONFIG__.API_BASE) || (location.protocol + '//' + location.host);
	const VPS_IP = (window.__CONFIG__ && window.__CONFIG__.VPS_IP) || window.location.hostname;
	let _latestJogos = [];
	let jogosOrderByTimeDesc = true; // true = descending by tempo (highest minute first)
	// Use same-origin relative path when possible so EventSource follows the website origin (works with reverse proxy)
	const eventSource = new EventSource(new URL('/events', API_BASE).toString());
	const gridJogos = document.getElementById('grid-jogos');

	function abrirModal(src) {
		document.getElementById('modal-momentum-img').src = src;
		document.getElementById('modal-momentum').classList.add('open');
	}
	function fecharModal() {
		document.getElementById('modal-momentum').classList.remove('open');
		document.getElementById('modal-momentum-img').src = '';
	}
	document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });
	// Cache local de screenshots — evita re-render quando base64 não mudou
	const _imgCache = {};

	async function adicionarJogo() {
		const input = document.getElementById('input-url');
		const btn = document.getElementById('btn-iniciar');
		const msg = document.getElementById('msg-status');
		const url = input.value.trim();

		if (!url.startsWith('http')) {
			msg.textContent = '⚠️ URL inválida. Cole um link completo do RadarFutebol.';
			msg.className = 'text-xs font-mono mt-2 h-4 text-red-400';
			return;
		}

		btn.disabled = true;
		btn.textContent = '⏳ Abrindo...';
		msg.textContent = '';

		try {
			const res = await fetch(`http://${VPS_IP}:3000/add-game`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ url })
			});
			const data = await res.json();
			if (data.ok) {
				msg.textContent = '✅ Jogo adicionado ao pool!';
				msg.className = 'text-xs font-mono mt-2 h-4 text-emerald-400';
				input.value = '';
			} else {
				msg.textContent = `❌ Erro: ${data.erro}`;
				msg.className = 'text-xs font-mono mt-2 h-4 text-red-400';
			}
		} catch (e) {
			msg.textContent = '❌ Falha na ligação ao servidor.';
			msg.className = 'text-xs font-mono mt-2 h-4 text-red-400';
		}

		btn.disabled = false;
		btn.textContent = '▶ INICIAR';
		setTimeout(() => { msg.textContent = ''; }, 4000);
	}

	// Permite iniciar com Enter no campo de input
	document.getElementById('input-url').addEventListener('keydown', e => {
		if (e.key === 'Enter') adicionarJogo();
	});

	eventSource.onmessage = function(event) {
		const jogos = JSON.parse(event.data);
		// Debug: report which jogos include analysis at arrival
		try {
			const analysisReport = (jogos || []).map(j => ({ id: j.id, hasEngineAnalysis: !!j.engineAnalysis, has_engine_keys: Object.keys(j || {}).filter(k=>/engine|analysis/i.test(k)) }));
			console.debug('[SSE] incoming jogos analysis report:', analysisReport);
		} catch(e) { console.debug('[SSE] analysis report error', e); }
		_latestJogos = jogos;
		if (jogos.length === 0) {
			gridJogos.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 border border-dashed border-gray-800 rounded-xl bg-gray-900/30 font-mono">🛰️ Sem partidas ativas no Pool. Cole uma URL acima para começar a monitorar.</div>`;
			return;
		}
		gridJogos.innerHTML = '';

		// sort by tempo (minute) if requested before rendering
		try{
			if (Array.isArray(jogos)) {
				jogos.sort((a,b)=>{
					const ta = parseInt(String(a.tempo||'').replace(/[^0-9]/g,''),10) || 0;
					const tb = parseInt(String(b.tempo||'').replace(/[^0-9]/g,''),10) || 0;
					return jogosOrderByTimeDesc ? (tb - ta) : (ta - tb);
				});
			}
		}catch(e){/* non-fatal */}
		jogos.forEach(jogo => {
			// sanitize incoming jogo object: remove literal '-' placeholders
			function sanitizeJogo(obj) {
				if (!obj || typeof obj !== 'object') return obj;
				const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
				for (const k of Object.keys(obj)) {
					const v = obj[k];
					if (typeof v === 'string') {
						const t = v.trim();
						obj[k] = (t === '-') ? '' : esc(v);
					} else if (Array.isArray(v)) {
						obj[k] = v.map(x => (typeof x === 'string') ? ((x.trim() === '-') ? '' : esc(x)) : x);
					} else if (v && typeof v === 'object') sanitizeJogo(v);
				}
				return obj;
			}
			sanitizeJogo(jogo);
			// Actualiza o cache de screenshot apenas quando o timestamp mudou
			if (jogo.sofascoreMomentumImg && jogo.sofascoreMomentumTs) {
				if (_imgCache[jogo.id]?.ts !== jogo.sofascoreMomentumTs) {
					_imgCache[jogo.id] = { ts: jogo.sofascoreMomentumTs, img: jogo.sofascoreMomentumImg };
				}
			}
			const momentumImg = _imgCache[jogo.id]?.img || null;
			const totalAtq = (jogo.momentum.ataquesCasa + jogo.momentum.ataquesFora) || 1;
			const pctCasaAPM = Math.round((jogo.momentum.ataquesCasa / totalAtq) * 100);
			const pctForaAPM = 100 - pctCasaAPM;

			const posseCasa = parseInt(jogo.posseBolaCasa) || 50;
			const posseFora = parseInt(jogo.posseBolaFora) || (100 - posseCasa);

			let cardBorda = "border-gray-800 bg-gray-900/60";
			let statusBadge = "bg-gray-800 text-gray-400";

			if (jogo.statusGatilho.includes('GATILHO') || jogo.statusGatilho.includes('ALERTA')) {
				cardBorda = "border-red-600 alerta-ativo shadow-red-900/40 shadow-2xl text-white";
				statusBadge = "bg-white text-red-700 font-black animate-pulse";
			} else if (jogo.statusGatilho.includes('LAY 0x0')) {
				cardBorda = "border-blue-500 bg-gray-900 shadow-blue-950/20 shadow-xl";
				statusBadge = "bg-blue-400 text-gray-950 font-black animate-pulse";
			} else if (jogo.statusGatilho.includes('LAY')) {
				cardBorda = "border-yellow-500 bg-gray-900 shadow-yellow-950/20 shadow-xl";
				statusBadge = "bg-yellow-400 text-gray-950 font-black animate-pulse";
			} else if (jogo.pressao >= 1.5) {
				cardBorda = "border-amber-600 bg-gray-900 shadow-amber-950/20 shadow-xl";
				statusBadge = "bg-amber-500 text-gray-950 font-black";
			}

			// Indicador visual se a engine forneceu análise (mesmo que vazia)
			// always render analysis button on the card; toggleAnalysis will show modal or indicate no analysis
			let analysisIndicator = `<span class="ml-2 text-2xs px-2 py-0.5 rounded bg-emerald-500 text-black font-bold cursor-pointer" onclick="event.stopPropagation(); toggleAnalysis('${jogo.id}')">🔬 Análise</span>`;

			const cardHtml = `
                    <div class="border rounded-2xl p-5 flex flex-col justify-between transition-all duration-300 ${cardBorda} jogo-card" data-jogo-id="${jogo.id}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-mono text-xs font-black tracking-wider bg-gray-950 px-2.5 py-1 rounded-md text-amber-500 border border-gray-800">⏱️ ${jogo.noIntervalo ? 'HT' : jogo.tempo + "'"}</span>
                            <div class="flex items-center">
                                <span class="text-2xs uppercase px-3 py-1 rounded-full font-mono font-bold tracking-widest ${statusBadge} cursor-pointer" onclick="event.stopPropagation(); showSignalData('${jogo.id}')">${jogo.statusGatilho}</span>
                                ${analysisIndicator}
								<!-- Botão rápido para abrir o link da partida (usa explicitamente jogo.url; se ausente o botão fica desabilitado) -->
								<!-- Sempre renderiza botão ativo; openGameLink validará a URL e mostrará alerta se ausente -->
								<button class="ml-2 text-2xs px-2 py-0.5 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700 text-amber-300 font-bold" onclick="event.stopPropagation(); openGameLink('${escapeHtml(jogo.url || '')}')">🔗 Link</button>
                             </div>
                        </div>

                        <div class="text-center my-1">
                            <h2 class="text-md font-bold text-gray-100 tracking-tight truncate px-2">${jogo.nomePartida}</h2>
                            <div class="text-3xl font-black font-mono tracking-widest text-amber-500 my-2 bg-gray-950 py-1.5 rounded-xl border border-gray-800/60 shadow-inner">${jogo.placar || '0 - 0'}</div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 text-2xs font-mono bg-gray-950/50 p-2.5 rounded-xl border border-gray-900 my-2">
                            <div class="text-gray-400">🤖 xG CASA: <span class="text-amber-500 font-bold">${jogo.xgCasa.toFixed(2)}</span></div>
                            <div class="text-right text-gray-400">🤖 xG FORA: <span class="text-gray-200 font-bold">${jogo.xgFora.toFixed(2)}</span></div>
                            <div class="col-span-2 border-t border-gray-900/60 my-1"></div>
                            <div class="col-span-2 text-center text-amber-400 font-black tracking-wide">🔥 MOMENTUM: ${jogo.pressao.toFixed(2)} AP/Min</div>
                        </div>

                        ${jogo.betfairOdds && jogo.betfairOdds.statusMercado === 'OPEN' ? `
                        <div class="bg-gray-950/70 border border-emerald-900/50 rounded-xl p-2 text-2xs font-mono mb-2">
                            <div class="text-center font-bold text-emerald-500/80 text-3xs tracking-wider border-b border-emerald-900/30 pb-1 mb-1.5">🎰 ODDS BETFAIR (MATCH ODDS)</div>
                            <div class="grid grid-cols-3 gap-1 text-center">
                                <div>
                                    <div class="text-gray-500 text-3xs mb-0.5">CASA</div>
                                    <div class="text-emerald-400 font-black text-sm">${jogo.betfairOdds.oddCasaBack ?? '—'}</div>
                                    <div class="text-red-400/70 text-3xs">lay ${jogo.betfairOdds.oddCasaLay ?? '—'}</div>
                                </div>
                                <div>
                                    <div class="text-gray-500 text-3xs mb-0.5">EMPATE</div>
                                    <div class="text-emerald-400 font-black text-sm">${jogo.betfairOdds.oddEmpateBack ?? '—'}</div>
                                    <div class="text-red-400/70 text-3xs">lay ${jogo.betfairOdds.oddEmpateLay ?? '—'}</div>
                                </div>
                                <div>
                                    <div class="text-gray-500 text-3xs mb-0.5">FORA</div>
                                    <div class="text-emerald-400 font-black text-sm">${jogo.betfairOdds.oddForaBack ?? '—'}</div>
                                    <div class="text-red-400/70 text-3xs">lay ${jogo.betfairOdds.oddForaLay ?? '—'}</div>
                                </div>
                            </div>
                        </div>` : ''}
-
                        <div class="mt-2">
                            <div class="flex justify-between items-center text-3xs font-mono text-gray-400 mb-1 px-0.5">
                                <span class="bg-gray-950/80 px-1.5 py-0.5 rounded border border-gray-900/60">CASA: <strong class="text-amber-500">${jogo.momentum.ataquesCasa} AP</strong></span>
                                <span class="font-bold tracking-wider text-gray-500 text-3xs">📊 VELOCIDADE APM (10M)</span>
                                <span class="bg-gray-950/80 px-1.5 py-0.5 rounded border border-gray-900/60 text-right">FORA: <strong class="text-gray-300">${jogo.momentum.ataquesFora} AP</strong></span>
                            </div>
                            <div class="w-full bg-gray-950 rounded-full h-3 flex overflow-hidden border border-gray-800 shadow-inner">
                                <div class="bg-amber-500 h-full transition-all duration-500 flex justify-end items-center pr-1" style="width: ${pctCasaAPM}%">${pctCasaAPM > 18 ? `<span class="text-3xs font-black text-gray-950">${pctCasaAPM}%</span>` : ''}</div>
                                <div class="bg-gray-700 h-full transition-all duration-500 flex justify-start items-center pl-1" style="width: ${pctForaAPM}%">${pctForaAPM > 18 ? `<span class="text-3xs font-black text-white">${pctForaAPM}%</span>` : ''}</div>
                            </div>
                        </div>
-
                        <div class="mt-2.5">
                            <div class="flex justify-between items-center text-3xs font-mono text-gray-400 mb-1 px-0.5">
                                <span class="${posseCasa >= 60 ? 'text-red-400' : 'text-amber-500/90'} font-semibold">${posseCasa}%</span>
                                <span class="font-bold tracking-wider text-gray-500 text-3xs">🔄 POSSE DE BOLA JOGO</span>
                                <span class="${posseFora >= 60 ? 'text-red-400' : 'text-gray-400'} font-semibold text-right">${posseFora}%</span>
                            </div>
                            <div class="w-full bg-gray-950 rounded-full h-2 flex overflow-hidden border border-gray-800/50">
                                <div class="h-full transition-all duration-500 ${posseCasa >= 60 ? 'bg-red-500' : 'bg-gradient-to-r from-amber-600 to-amber-500'}" style="width: ${posseCasa}%"></div>
                                <div class="h-full transition-all duration-500 ${posseFora >= 60 ? 'bg-red-500' : 'bg-gray-600'}" style="width: ${posseFora}%"></div>
                            </div>
                        </div>
-
                        <div class="mt-3 bg-gray-950/40 border border-gray-900 rounded-xl p-2 text-2xs font-mono">
                            <div class="text-center font-bold text-gray-500 text-3xs tracking-wider border-b border-gray-900/50 pb-1 mb-1.5">📊 QUADRO 1: TELEMETRIA TOTAL (MACRO)</div>
                            <div class="flex justify-between px-1 mb-0.5"><span class="text-gray-400">Atq. Perigosos:</span><span class="text-amber-500 font-bold">${jogo.atqPerigososCasa}</span><span class="text-gray-500">vs</span><span class="text-gray-300 font-bold">${jogo.atqPerigososFora}</span></div>
                            <div class="flex justify-between px-1 mb-0.5"><span class="text-gray-400">Chutes Alvo/Fora:</span><span class="text-amber-500 font-bold">${jogo.chutesNoAlvoCasa}/${jogo.chutesParaForaCasa}</span><span class="text-gray-500">vs</span><span class="text-gray-300 font-bold">${jogo.chutesNoAlvoFora}/${jogo.chutesParaForaFora}</span></div>
                            <div class="flex justify-between px-1"><span class="text-gray-400">Escanteios:</span><span class="text-amber-500 font-bold">${jogo.escanteiosCasa}</span><span class="text-gray-500">vs</span><span class="text-gray-300 font-bold">${jogo.escanteiosFora}</span></div>
                        </div>
-
                        <div class="mt-2 bg-gray-950/20 border border-gray-900 rounded-xl p-2 text-2xs font-mono">
                            <div class="text-center font-bold text-gray-500 text-3xs tracking-wider border-b border-gray-900/50 pb-1 mb-1.5">🔬 QUADRO 2: MOMENTUM REAL (MICRO 10M)</div>
                            <div class="flex justify-between px-1 mb-0.5"><span class="text-gray-400">Chutes Alvo/Fora:</span><span class="text-amber-500 font-bold">${jogo.momentum.chutesNoAlvoCasa}/${jogo.momentum.chutesParaForaCasa}</span><span class="text-gray-500">vs</span><span class="text-gray-300 font-bold">${jogo.momentum.chutesNoAlvoFora}/${jogo.momentum.chutesParaForaFora}</span></div>
                            <div class="flex justify-between px-1"><span class="text-gray-400">Escanteios:</span><span class="text-amber-500 font-bold">${jogo.momentum.escanteiosCasa}</span><span class="text-gray-500">vs</span><span class="text-gray-300 font-bold">${jogo.momentum.escanteiosFora}</span></div>
                        </div>
                    </div>
                `;
			gridJogos.innerHTML += cardHtml;
			// cleanup: remove any text-only nodes that contain only a lone hyphen '-'
			try {
				setTimeout(() => {
					const cardEl = gridJogos.querySelector(`.jogo-card[data-jogo-id="${jogo.id}"]`);
					if (!cardEl) return;
					const walker = document.createTreeWalker(cardEl, NodeFilter.SHOW_TEXT, null, false);
					const toRemove = [];
					while (walker.nextNode()) {
						const txt = walker.currentNode.nodeValue;
						if (typeof txt === 'string' && txt.trim() === '-') toRemove.push(walker.currentNode);
					}
					for (const n of toRemove) n.nodeValue = '';
				}, 50);
			} catch (e) { /* non-fatal */ }
		});

		// ensure analysis badges are injected after rendering (fix: badge sometimes missing)
		try{ if (typeof updateAnalysisBadges === 'function') updateAnalysisBadges(jogos); }catch(e){}
	};
	eventSource.onerror = function() { gridJogos.innerHTML = `<div class="col-span-full text-center py-20 text-red-500 font-mono border border-red-900/40 bg-red-950/10 rounded-xl">⚠️ LINK DE DADOS INDISPONÍVEL.</div>`; };

	// --- Modal de Análise de Métodos (Engine) ---
	function toggleAnalysis(jogoId) {
		const modal = document.getElementById('modal-analysis');
		const content = document.getElementById('modal-analysis-content');
		if (!modal || !content) return;
		// find jogo in latest payload
		const jogo = _latestJogos.find(j => String(j.id) === String(jogoId));
		// prefer engineAnalysis, fallback to internal _engineAnalysis if present
		const analysisSource = (jogo && (jogo.engineAnalysis || jogo._engineAnalysis || jogo.analysis || jogo._analysis)) || null;
		// Debug logging to help diagnose missing analysis
		try { console.debug('[toggleAnalysis] jogoId=', jogoId, 'found?', !!jogo, 'has engineAnalysis?', !!(jogo && jogo.engineAnalysis), 'has _engineAnalysis?', !!(jogo && jogo._engineAnalysis), 'other analysis keys?', !!(jogo && (jogo.analysis || jogo._analysis))); } catch (e) {}
		// debug: log raw analysis to browser console for inspection (safe stringify)
		try {
			let dumped = analysisSource;
			try { dumped = JSON.stringify(analysisSource, null, 2); } catch (e) { dumped = String(analysisSource); }
		} catch (_) { /* non-fatal debug */ }
		// Extract possible telegram message from known locations (logger may attach it)
		const telegramMsg = (jogo && (jogo.telegramMessage || jogo.lastTelegramMessage || jogo._lastTelegram || jogo.telegram || jogo.lastTelegram)) || (analysisSource && (analysisSource.sentMessage || analysisSource.telegram || analysisSource.telegramMessage)) || null;

		// If analysis is missing, try a tolerant recursive search for any analysis-like object
		function looksLikeAnalysis(o) {
			if (!o || typeof o !== 'object') return false;
			// common engine analysis fields: met (bool) and missing (array) or satisfied
			if (typeof o.met === 'boolean' && (Array.isArray(o.missing) || Array.isArray(o.satisfied) || Array.isArray(o.expected))) return true;
			return false;
		}
		function findAnalysisIn(obj, seen = new WeakSet()) {
			if (!obj || typeof obj !== 'object' || seen.has(obj)) return null;
			seen.add(obj);
			if (looksLikeAnalysis(obj)) return obj;
			for (const k of Object.keys(obj)) {
				try {
					const v = obj[k];
					if (looksLikeAnalysis(v)) return v;
					if (v && typeof v === 'object') {
						const found = findAnalysisIn(v, seen);
						if (found) return found;
					}
				} catch (e) { /* ignore traversal errors */ }
			}
			return null;
		}
		let tolerantAnalysis = analysisSource;
		if (!tolerantAnalysis && jogo) tolerantAnalysis = findAnalysisIn(jogo) || null;

		// Treat empty objects ("{}") as missing analysis so user sees debug payload
		const analysisIsEmptyObject = tolerantAnalysis && typeof tolerantAnalysis === 'object' && !Array.isArray(tolerantAnalysis) && Object.keys(tolerantAnalysis).length === 0;

		if (!jogo || !tolerantAnalysis || analysisIsEmptyObject) {
			// Provide richer debug view so user can inspect why analysis is missing
			let debugHtml = `<div class="text-sm text-gray-300">Nenhuma análise disponível para este jogo.</div>`;
			if (jogo) {
				try {
					debugHtml += `<div style="margin-top:8px;padding:8px;border-radius:8px;background:#07121a;border:1px solid #122;color:#bcd;font-family:monospace;max-height:40vh;overflow:auto;"><strong>Payload (debug):</strong><pre style="white-space:pre-wrap">${escapeHtml(JSON.stringify(jogo, null, 2))}</pre></div>`;
				} catch (e) { /* ignore */ }
			}
			// if we found a tolerantAnalysis deeper in the object, show it too for clarity
			if (tolerantAnalysis) {
				try {
					debugHtml += `<div style="margin-top:8px;padding:8px;border-radius:8px;background:#07121a;border:1px solid #122;color:#bcd;font-family:monospace;max-height:30vh;overflow:auto;"><strong>Encontrada análise (heurística):</strong><pre style="white-space:pre-wrap">${escapeHtml(JSON.stringify(tolerantAnalysis, null, 2))}</pre></div>`;
				} catch(e) {}
			}
			content.innerHTML = debugHtml;
			try { const t = document.getElementById('modal-analysis-title'); if (t) t.textContent = '🔬 Análise do Motor — Métodos'; } catch(e){}
		} else {
			content.innerHTML = renderEngineAnalysis(jogo, analysisSource, telegramMsg);
		}
		// Atualiza o título do modal com nome da partida, tempo atual e placar
		try {
			const titleEl = document.getElementById('modal-analysis-title');
			if (titleEl && jogo) {
				const nome = jogo.nomePartida || '';
				const tempo = jogo.noIntervalo ? 'HT' : (jogo.tempo ? String(jogo.tempo) + "'" : '');
				const placar = jogo.placar || '';
				titleEl.textContent = `${nome}${tempo ? ' — ' + tempo : ''}${placar ? ' — ' + placar : ''}`;
			}
		} catch (e) { /* non-fatal */ }
		modal.classList.add('open');
		// reset draggable position when opening (centered)
		const box = document.getElementById('modal-analysis-box');
		const modalEl = document.getElementById('modal-analysis');
		if (box && modalEl) {
			// clear inline left/top to allow centering via modal flexbox
			box.style.left = '';
			box.style.top = '';
			box.style.transform = '';
			modalEl.style.alignItems = 'center';
			modalEl.style.justifyContent = 'center';
		}
	}

	// Make the analysis modal draggable by its title
	(function(){
		const modal = document.getElementById('modal-analysis');
		const box = document.getElementById('modal-analysis-box');
		const title = document.getElementById('modal-analysis-title');
		if (!modal || !box || !title) return;
		title.style.cursor = 'move';
		let dragging = false; let startX=0, startY=0, origLeft=0, origTop=0;

		const onDown = (e)=>{
			e.preventDefault();
			dragging = true;
			const rect = box.getBoundingClientRect();
			origLeft = rect.left;
			origTop = rect.top;
			startX = (e.touches ? e.touches[0].clientX : e.clientX);
			startY = (e.touches ? e.touches[0].clientY : e.clientY);
			// switch modal to top-left anchored so we can position absolutely
			modal.style.alignItems = 'flex-start';
			modal.style.justifyContent = 'flex-start';
			box.style.position = 'fixed';
			box.style.margin = '0';
			box.style.left = origLeft + 'px';
			box.style.top = origTop + 'px';
			box.style.transform = '';
		};
		const onMove = (e)=>{
			if(!dragging) return;
			const cx = (e.touches ? e.touches[0].clientX : e.clientX);
			const cy = (e.touches ? e.touches[0].clientY : e.clientY);
			const dx = cx - startX; const dy = cy - startY;
			box.style.left = (origLeft + dx) + 'px';
			box.style.top = (origTop + dy) + 'px';
		};
		const onUp = ()=>{ dragging = false; };
		title.addEventListener('mousedown', onDown);
		title.addEventListener('touchstart', onDown,{passive:false});
		window.addEventListener('mousemove', onMove);
		window.addEventListener('touchmove', onMove,{passive:false});
		window.addEventListener('mouseup', onUp);
		window.addEventListener('touchend', onUp);
	})();

	function renderEngineAnalysis(jogo, analysis, telegramMsg) {
		// friendly mapping for criteria codes
		const friendly = {
			emCooldown: 'Em cooldown após golo (aguardar)',
			janelaTempo: 'Tempo de Jogo',
			'dominancia<2.0': 'Dominancia time (min 2)',
			'apmDominante<0.8': 'APM dominante (min 0.8)',
			'atqDominante<8': 'Ataques do time dominante (min 8)',
			'difGols>1': 'Diferença de golos alta (não elegível)',
			'qualDominante>=18%': 'Qualidade do ataque (time dominante) — mín 18%',
			'posseConfirma': 'Posse confirmatória (mín 55%)',
			'difGols>0': 'Diferença de golos > 0 — equipa em vantagem (não elegível para gatilho)',
			'difGolsFora': 'Diferença de golos fora do intervalo permitido',
			'ataquesCasa<10': 'Ataques Perigosos(mín 10)',
			'ataquesFora<10': 'Ataques Perigosos(min 10)',
			'chutesNoAlvoCasa<2': 'Chute no alvo(min 2)',
			'chutesNoAlvoFora<2': 'Chute no alvo(min 2)',
			aceleracaoNegativa: 'Aceleração negativa (sem crescimento)',
			qualidadeBaixa: 'Qualidade do ataque baixa',
			sustainedPressure: 'Pressão sustentada (sustained pressure)',
			score: 'Score esperado / confidence',
			'chutesNoAlvoCasa+escanteios<3': 'Chute no alvo + Escanteios(min 3)',
			'chutesNoAlvoFora+escanteios<3': 'Chutes ao alvo + Escanteios(min 3)',
			'ch+esc<3': 'Chute no alvo + Escanteios(min 3)',
			'ch+esc': 'Chute no alvo + Escanteios',
			'qualidadeN/D': 'Qualidade do ataque (N/D)',
		};

		// Período de tempo (janela) por método — exibido no cabeçalho para clareza
		const methodPeriods = {
			'GATILHO_1T': "Janela: 15'–40'",
			'GATILHO_1T_FORA': "Janela: 15'–40'",
			'GATILHO_2T': "Janela: 46'–85'",
			'GATILHO_2T_FORA': "Janela: 46'–85'",
			'LAY_DRAW': "Janela: 25'–80'",
			'FAVORITO_VENCE': "Janela: 15'–70'",
			'FAVORITO_VIRA': "Janela: 20'–75'"
		};

		// Default expected criteria per method (used when analyzer reported empty missing array)
		const defaultCriteria = {
			'GATILHO_1T': ['janelaTempo', 'difGols>1', 'ataquesCasa<10', 'chutesNoAlvoCasa<2', 'aceleracaoNegativa', 'qualidadeBaixa'],
			'GATILHO_1T_FORA': ['janelaTempo', 'difGolsFora', 'ataquesFora<10', 'chutesNoAlvoFora<2', 'aceleracaoNegativa', 'qualidadeBaixa'],
			'GATILHO_2T': ['janelaTempo', 'difGols>0', 'ataquesCasa<12', 'score', 'sustainedPressure', 'ch+esc<3', 'chutesNoAlvoCasa+escanteios<3', 'aceleracaoNegativa', 'qualidadeBaixa'],
			'GATILHO_2T_FORA': ['janelaTempo', 'ataquesFora<12', 'chutesNoAlvoFora+escanteios<3', 'aceleracaoNegativa', 'qualidadeBaixa'],
			'LAY_DRAW': ['janelaTempo', 'empate', 'dominancia<2.0', 'apmDominante<0.8', 'atqDominante<8', 'qualidadeBaixa'],
			'FAVORITO_VENCE': ['janelaTempo', 'difGols>1', 'ataquesCasa<10', 'chutesNoAlvoCasa<2', 'aceleracaoNegativa', 'qualidadeBaixa'],
			'FAVORITO_VIRA': ['janelaTempo', 'difGols>1', 'ataquesCasa<10', 'chutesNoAlvoCasa<2', 'aceleracaoNegativa', 'qualidadeBaixa']
		};

		let html = '';
		html += '<div class="space-y-3">';
		const rawTempo = jogo && jogo.tempo ? String(jogo.tempo) : '';
		const minAtual = parseInt((rawTempo || '').replace(/[^0-9]/g, ''), 10) || 0;
		const hideFirstHalf = minAtual > 45; // if in second half hide first-half-only methods
		const firstHalfMethods = new Set(['GATILHO_1T','GATILHO_1T_FORA']);
		for (const method in analysis) {
			// omit legacy / removed methods that may still appear in stored analysis
			if (String(method).toUpperCase() === 'LAY_0X0') continue;
			if (hideFirstHalf && firstHalfMethods.has(method)) continue;
			const entry = analysis[method] || { met: false, missing: [] };
			const statusBadge = entry.met ? '<span class="px-2 py-0.5 rounded bg-emerald-500 text-black font-bold text-2xs">SATISFEITO</span>' : '<span class="px-2 py-0.5 rounded bg-red-600 text-white font-bold text-2xs">FALTANDO</span>';
			const periodLabel = methodPeriods[method] ? `<div class="text-2xs text-gray-400">${methodPeriods[method]}</div>` : '';
			// accordion header for the method
			html += `<div class="mb-1 border-b border-gray-800 pb-1">
						<button type="button" class="w-full flex justify-between items-center method-header" data-method="${escapeHtml(method)}" onclick="(function(b){const t=b.nextElementSibling; if(t) t.style.display = (t.style.display==='none'?'block':'none');})(this);">
							<div>
								<div class="font-bold text-2xs text-gray-200">${method.replace(/_/g,' ')}</div>
								${periodLabel}
							</div>
							<div class="ml-3">${statusBadge}</div>
						</button>
					 </div>`;
			// Build unified criteria view: show each criterion green if satisfied, red if missing
			const expected = Array.isArray(entry.expected) ? entry.expected.slice() : [];
			let satisfied = [];
			if (Array.isArray(entry.satisfied)) satisfied = entry.satisfied.slice();
			else if (entry.satisfied && typeof entry.satisfied === 'object') {
				// convert map/object to list of keys
				try { satisfied = Object.keys(entry.satisfied); } catch(e) { satisfied = []; }
			}
			const missing = Array.isArray(entry.missing) ? entry.missing.slice() : [];
			// If entry.met is true, consider expected criteria satisfied (friendly UX)
			if (entry.met && expected.length>0) {
				satisfied = expected.slice();
			}
			// Ensure time-window appears among expected for clarity
			if (methodPeriods[method] && !expected.includes('janelaTempo')) expected.unshift('janelaTempo');
			// union of keys preserving order: expected then satisfied missing extras
			const seenCriteria = new Set();
			const allCriteria = [];
			for (const c of expected.concat(satisfied).concat(missing)) { if (!seenCriteria.has(String(c))) { seenCriteria.add(String(c)); allCriteria.push(c); } }
			// criteria panel (hidden by default)
			html += '<div class="method-panel" style="display:block;margin-bottom:6px;">';
			html += '<ul class="mt-1 ml-3 list-disc list-inside text-2xs">';
			for (const critRaw of allCriteria) {
				// determine if this criterion is satisfied
				const isSatisfied = satisfied && satisfied.some(s => String(s) === String(critRaw));
				const isMissing = missing && missing.some(m => String(m) === String(critRaw));
				// Fallback heuristics: mark time-window satisfied when current minute falls into method period
				try {
					if (!isSatisfied) {
						const critKey = (typeof critRaw === 'string') ? critRaw : (critRaw && critRaw.key ? String(critRaw.key) : String(critRaw));
						if (critKey === 'janelaTempo') {
							const t = jogo && jogo.tempo ? parseInt(String(jogo.tempo).replace(/[^0-9]/g,''),10) : 0;
							// simple range detection based on method name
							if (method && String(method).includes('2T') && t >= 46 && t <= 85) {
								// mark as satisfied (user is in 2nd half)
								// mutate local satisfied copy so subsequent checks see it
								satisfied.push('janelaTempo');
								// update flag
								// eslint-disable-next-line no-unused-vars
								// continue
							}
						} else if (critKey.toLowerCase().includes('score') && (value !== null && value !== undefined && value !== '')) {
							// if analyzer reported a numeric score/value, consider it satisfied for visibility
							try { const num = parseFloat(value); if (!Number.isNaN(num) && num > 0) { satisfied.push(critKey); } } catch(_){}
						}
					}
				} catch(e) { /* ignore heuristic errors */ }
				// reuse previous parsing to derive friendly text and value
				let crit = critRaw;
				let value = null;
				if (critRaw && typeof critRaw === 'object') {
					crit = critRaw.key || critRaw.criteria || critRaw.nome || critRaw.descricao || critRaw.value || critRaw.name || Object.keys(critRaw)[0];
					value = critRaw.value ?? critRaw.valor ?? critRaw.valorAtual ?? critRaw.val ?? critRaw.v;
				} else if (typeof critRaw === 'string') {
					const s = critRaw;
					const m = s.match(/\(valor:\s*([^\)]+)\)/i);
					if (m) value = m[1]; else {
						const m2 = s.match(/:\s*([0-9]+(?:\.[0-9]+)?)/);
						if (m2) value = m2[1];
					}
					crit = s.split(' - ')[0].split(' (')[0].split(':')[0].trim();
				}
				const normCrit = String(crit).replace(/\s+/g, '');
				let friendlyText = friendly[crit] || friendly[normCrit] || null;
				if (!friendlyText) {
					for (const fk of Object.keys(friendly)) {
						try { if (String(crit).toLowerCase().includes(fk.replace(/<.*$/,'').toLowerCase()) || normCrit.toLowerCase().includes(fk.replace(/<.*$/,'').toLowerCase())) { friendlyText = friendly[fk]; break; } } catch(_) {}
					}
				}
				if (!friendlyText) friendlyText = crit;
				// format display line
				let line = friendlyText;
				if (String(crit).startsWith('chutesNoAlvoCasa')) {
					const m = String(crit).match(/<\s*=?\s*(\d+)/);
					const minReq = m ? m[1] : null;
					const atual = (value !== null && value !== undefined && value !== '') ? String(value) : '—';
					if (minReq) line = `Chute no alvo(min ${minReq})(valor: ${atual})`; else line = `${friendlyText} (Atual: ${atual})`;
				} else {
					let suffix = '';
					if (value !== null && value !== undefined && value !== '') {
						const critLower = String(crit).toLowerCase();
						if (crit === 'qualidadeBaixa' || critLower.includes('qualidade')) suffix = ` - Valor atual: ${String(value)}%`;
						else if (crit === 'janelaTempo') suffix = ` - Valor atual: ${String(value)}`;
						else if (critLower.startsWith('ratio') || critLower.includes('ratio')) { const num = parseFloat(value); const v = Number.isFinite(num) ? num.toFixed(2) : value; suffix = ` - Valor atual: ${v}`; }
						else if (critLower.startsWith('placar') || critLower.includes('placar')) suffix = ` - Valor atual: ${String(value)}`;
						else if (critLower.includes('pressao') || critLower.startsWith('pressao')) { const numP = parseFloat(value); const vp = Number.isFinite(numP) ? numP.toFixed(2) : value; suffix = ` - Valor atual: ${vp}`; }
						else if (critLower.includes('dominancia') || critLower.startsWith('dominancia') || critLower.includes('apmdominante')) { const numD = parseFloat(value); const vd = Number.isFinite(numD) ? numD.toFixed(2) : value; suffix = ` - Valor atual: ${vd}`; }
						else if (critLower.includes('atq') || critLower.includes('ataques') || critLower.includes('ataque') || critLower.includes('atqdominante')) { const numA = parseInt(value, 10); const va = Number.isFinite(numA) ? String(numA) : String(value); suffix = ` - Valor atual: ${va}`; }
						else suffix = ` - Valor atual: ${String(value)}`;
					}
					line = friendlyText + suffix;
				}
				// color and link
				const liClass = isSatisfied ? 'text-emerald-300' : (isMissing ? 'text-red-400' : 'text-amber-300');
				const icon = isSatisfied ? '✅' : (isMissing ? '❌' : '⚪');
				if (telegramMsg) html += `<li class="${liClass}"><span style="display:inline-block;width:20px">${icon}</span><a href="#" onclick="event.preventDefault(); openTelegramPreview('${escapeHtml(String(telegramMsg))}');" class="underline decoration-dotted">${line}</a></li>`;
				else html += `<li class="${liClass}"><span style="display:inline-block;width:20px">${icon}</span>${line}</li>`;
			}
			html += '</ul>';
			html += '</div>';
		}
		html += '</div>';
		// hidden container for telegram preview (injected once per modal)
		html += `<div id="telegram-preview" style="display:none;margin-top:12px;padding:10px;border-radius:8px;background:#061021;border:1px solid #123;white-space:pre-wrap;font-family:monospace;">` + (telegramMsg ? escapeHtml(String(telegramMsg)) : '') + `</div>`;
		return html;
	}

	// helper to open telegram preview inside the modal
	function openTelegramPreview(msg) {
		const el = document.getElementById('telegram-preview');
		if (!el) return;
		el.style.display = 'block';
		el.textContent = msg || 'Nenhuma mensagem disponível.';
		// scroll into view inside modal
		el.scrollIntoView({ behavior: 'smooth', block: 'center' });
	}

	// small helper to safely escape quotes for embedding in onclick (basic)
	function escapeHtml(str) {
		return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
	}

	// Abre o link da partida em nova aba. Se a URL for local (screenshot endpoint), abre em nova aba também.
	function openGameLink(url) {
		try {
			if (!url) return alert('URL não disponível para este jogo.');
			window.open(url, '', 'width=800,height=400');
		} catch (e) { alert('Falha ao abrir link: ' + (e && e.message)); }
	}
</script>


<script>
	// Função resiliente para injetar badge de análise nos cards já renderizados
	function updateAnalysisBadges(listaJogos) {
		try {
			listaJogos = listaJogos || window._latestJogos || [];
			listaJogos.forEach(j => {
				const id = String(j.id || j.matchId || j.gameId || '');
				if (!id) return;
				// tenta múltiplos seletores comuns de cards
				const selectors = [
					`.jogo-card[data-id="${id}"]`,
					`#card-${id}`,
					`[data-jogo-id="${id}"]`,
					`div[data-id="${id}"]`,
				];
				let el = null;
				for (const s of selectors) {
					el = document.querySelector(s);
					if (el) break;
				}
				if (!el) return;
				// procura cabeçalho para colocar badge; se não existir usa el
				const header = el.querySelector('.card-header') || el.querySelector('.header') || el;
				// verifica se já temos badge
				if (header.querySelector('.engine-badge')) return;
				// show badge when analysis object exists (even empty) — renderer may attach empty object
				if (j.engineAnalysis || j._engineAnalysis) {
					const span = document.createElement('span');
					span.className = 'engine-badge';
					span.title = 'Análise do motor disponível — clique para ver detalhes';
					span.textContent = '🔬 Análise disponível';
					// estilo inline para compatibilidade rápida
					span.style.cssText = 'display:inline-block;margin-left:8px;padding:4px 8px;background:#0f1724;color:#b7f5d0;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;';
					span.addEventListener('click', function (ev) {
						ev.stopPropagation();
						// tenta extrair id e abrir modal existente
						const jogoId = id;
						if (typeof toggleAnalysis === 'function') toggleAnalysis(jogoId);
					});
					header.appendChild(span);
				}
			});
		} catch (e) { console.error('updateAnalysisBadges error', e); }
	}

	// Hook para ser chamado sempre que SSE atualiza _latestJogos
	(function () {
		const origHandle = window.__sseHandleLatestJogos;
		// se o código já definiu um hook, tenta preservar
		window.__sseHandleLatestJogos = function (listaJogos) {
			try { updateAnalysisBadges(listaJogos); } catch (e) {}
			if (typeof origHandle === 'function') origHandle(listaJogos);
		};
		// também tenta atualizar imediatamente se já houver jogos
		setTimeout(() => updateAnalysisBadges(window._latestJogos || []), 500);
	})();
</script>

<style>
	.engine-badge { transition: transform .12s ease; }
	.engine-badge:hover { transform: translateY(-2px); }
</style>
</body>
